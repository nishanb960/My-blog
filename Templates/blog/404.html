{% extends 'blog/base.html' %}
{% load static %}

{% block title %}Page Not Found - My Django Blog{% endblock %}

{% block content %}
<div class="error-page">
    <div class="container">
        <div class="error-content">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <div class="error-actions">
                <a href="{% url 'blog:home' %}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="{% url 'blog:post_list' %}" class="btn btn-outline">
                    <i class="fas fa-newspaper"></i> Browse Posts
                </a>
            </div>
        </div>
    </div>
</div>

<style>
.error-page {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 0;
}

.error-content h1 {
    font-size: 8rem;
    color: var(--primary-color);
    margin-bottom: 0;
    line-height: 1;
}

.error-content h2 {
    font-size: 2rem;
    margin-bottom: 1rem;
}

.error-content p {
    color: var(--secondary-color);
    margin-bottom: 2rem;
}

.error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
}
</style>
{% endblock %}
